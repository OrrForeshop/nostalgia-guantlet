name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Build web project
        run: npm run build

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r www/* android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          echo '{"pluginsFolderExists":false,"plugins":[]}' > android/app/src/main/assets/capacitor.plugins.json

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install required Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Decode keystore
        run: |
          base64 -d android/retrorush-release.b64 > android/app/retrorush-release.jks
          ls -la android/app/retrorush-release.jks

      - name: Build signed release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$PWD/app/retrorush-release.jks \
            -Pandroid.injected.signing.store.password=retrorush2024 \
            -Pandroid.injected.signing.key.alias=retrorush \
            -Pandroid.injected.signing.key.password=retrorush2024

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: RetroRush-release-signed
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
