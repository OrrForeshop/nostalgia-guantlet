name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Confirm Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/build-tools/ || true
          ls $ANDROID_HOME/platforms/ || true

      - name: Install Capacitor dependencies
        run: npm install

      - name: Prepare www/ with game files
        run: |
          mkdir -p www
          rsync -a \
            --exclude='www' \
            --exclude='node_modules' \
            --exclude='android' \
            --exclude='.github' \
            --exclude='.git' \
            . www/

      - name: Write Capacitor config
        run: |
          cat > capacitor.config.json << 'CAPEOF'
{"appId":"com.retrorush.nostalgiagauntlet","appName":"RetroRush","webDir":"www","server":{"androidScheme":"https"}}
CAPEOF
          cat capacitor.config.json

      - name: Add Android platform
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: npx cap add android

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RetroRush-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
