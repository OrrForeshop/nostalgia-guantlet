name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: npm install

      - name: Prepare web assets in www/
        run: |
          mkdir -p www
          # Copy all game files into www/ (exclude node_modules, android, .github)
          rsync -a --exclude='www' --exclude='node_modules' --exclude='android' --exclude='.github' --exclude='.git' . www/

      - name: Write capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.retrorush.nostalgiagauntlet",
            "appName": "RetroRush",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Create capacitor plugins file
        run: echo '[]' > capacitor.plugins.json

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets
        run: npx cap copy android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RetroRush-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
