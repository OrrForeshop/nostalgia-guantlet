name: Generate Release Keystore (Run Once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias retrorush \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore retrorush-release.jks \
            -storetype JKS \
            -storepass retrorush2024 \
            -keypass retrorush2024 \
            -dname "CN=RetroRush, OU=Games, O=RetroRush, L=Unknown, ST=Unknown, C=US" \
            -noprompt

      - name: Output base64 keystore
        run: |
          echo "====== COPY THIS BASE64 VALUE FOR GITHUB SECRET ======"
          base64 -w 0 retrorush-release.jks
          echo ""
          echo "======================================================="
          echo "KEY_ALIAS=retrorush"
          echo "KEY_PASSWORD=retrorush2024"
          echo "STORE_PASSWORD=retrorush2024"

      - name: Upload keystore file
        uses: actions/upload-artifact@v4
        with:
          name: retrorush-keystore
          path: retrorush-release.jks
          retention-days: 7
