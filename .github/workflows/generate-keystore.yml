name: Generate Release Keystore (Run Once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias retrorush \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore retrorush-release.jks \
            -storetype JKS \
            -storepass retrorush2024 \
            -keypass retrorush2024 \
            -dname "CN=RetroRush, OU=Games, O=RetroRush, L=Unknown, ST=Unknown, C=US" \
            -noprompt

      - name: Save base64 to file
        run: |
          base64 -w 0 retrorush-release.jks > keystore-base64.txt
          echo "" >> keystore-base64.txt
          echo "KEY_ALIAS=retrorush" >> keystore-base64.txt
          echo "KEY_PASSWORD=retrorush2024" >> keystore-base64.txt
          echo "STORE_PASSWORD=retrorush2024" >> keystore-base64.txt

      - name: Upload keystore artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retrorush-keystore
          path: |
            retrorush-release.jks
            keystore-base64.txt
          retention-days: 7
